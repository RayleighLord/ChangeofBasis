<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive two-dimensional change of basis visualizer."
    />
    <link rel="icon" href="./logo.svg" type="image/svg+xml" />
    <title>Change of Basis Explorer</title>
  </head>
  <body>
    <div class="app-shell">
      <main class="plot-panel" aria-labelledby="plot-heading">
        <h1 id="plot-heading" class="sr-only">Interactive Cartesian plane</h1>
        <div class="plot-stage">
          <div class="plot-square">
            <svg
              id="basis-plot"
              viewBox="0 0 800 800"
              role="img"
              aria-labelledby="plot-title plot-description"
            >
              <title id="plot-title">Interactive change of basis diagram</title>
              <desc id="plot-description">
                A Cartesian grid showing the standard basis, a user-defined basis, and a selected
                vector with its component decompositions.
              </desc>
            </svg>
          </div>
        </div>
      </main>

      <p id="plot-prompt" class="plot-prompt" role="status" aria-live="polite">
        Click on the grid to generate a vector
      </p>

      <section
        id="vector-coordinates-card"
        class="vector-coordinates-card"
        aria-label="Selected vector coordinates"
        hidden
      >
        <div id="vector-coordinate-standard" class="vector-coordinate-line"></div>
        <div id="vector-coordinate-prime" class="vector-coordinate-line"></div>
      </section>

      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-pressed="true"
        aria-label="Switch to light mode"
      >
        <span id="theme-toggle-icon" class="theme-toggle-icon" aria-hidden="true">☀</span>
        <span id="theme-toggle-label">Light mode</span>
      </button>

      <aside class="control-rail" aria-label="Change of basis controls">
        <form id="basis-form" class="control-section" novalidate>
          <div class="section-heading">
            <h2 id="basis-form-title"></h2>
            <button class="compact-button" type="submit">Update</button>
          </div>

          <div class="vector-entry-grid">
            <fieldset class="vector-fieldset basis-first">
              <legend id="basis-first-label"></legend>
              <label class="field">
                <span class="field-label">x</span>
                <input
                  id="basis-first-x"
                  type="text"
                  inputmode="numeric"
                  pattern="[+-]?[0-9]+"
                  value="1"
                  maxlength="32"
                  autocomplete="off"
                  aria-describedby="basis-first-x-error"
                />
                <span id="basis-first-x-error" class="field-error"></span>
              </label>
              <label class="field">
                <span class="field-label">y</span>
                <input
                  id="basis-first-y"
                  type="text"
                  inputmode="numeric"
                  pattern="[+-]?[0-9]+"
                  value="1"
                  maxlength="32"
                  autocomplete="off"
                  aria-describedby="basis-first-y-error"
                />
                <span id="basis-first-y-error" class="field-error"></span>
              </label>
            </fieldset>

            <fieldset class="vector-fieldset basis-second">
              <legend id="basis-second-label"></legend>
              <label class="field">
                <span class="field-label">x</span>
                <input
                  id="basis-second-x"
                  type="text"
                  inputmode="numeric"
                  pattern="[+-]?[0-9]+"
                  value="-1"
                  maxlength="32"
                  autocomplete="off"
                  aria-describedby="basis-second-x-error"
                />
                <span id="basis-second-x-error" class="field-error"></span>
              </label>
              <label class="field">
                <span class="field-label">y</span>
                <input
                  id="basis-second-y"
                  type="text"
                  inputmode="numeric"
                  pattern="[+-]?[0-9]+"
                  value="1"
                  maxlength="32"
                  autocomplete="off"
                  aria-describedby="basis-second-y-error"
                />
                <span id="basis-second-y-error" class="field-error"></span>
              </label>
            </fieldset>
          </div>
          <p id="basis-form-error" class="form-error" aria-live="polite"></p>
        </form>

        <form id="vector-form" class="control-section" novalidate>
          <div class="section-heading">
            <h2 id="vector-form-title"></h2>
            <div class="button-row">
              <button id="clear-vector-button" class="ghost-button compact-button" type="button">
                Clear
              </button>
              <button id="set-vector-button" class="compact-button" type="submit">Set</button>
            </div>
          </div>
          <div class="coordinate-input-row">
            <label class="field">
              <span class="field-label">v<sub>x</sub></span>
              <input
                id="vector-x"
                type="text"
                inputmode="numeric"
                pattern="[+-]?[0-9]+"
                placeholder="x"
                maxlength="32"
                autocomplete="off"
                aria-describedby="vector-x-error"
              />
              <span id="vector-x-error" class="field-error"></span>
            </label>
            <label class="field">
              <span class="field-label">v<sub>y</sub></span>
              <input
                id="vector-y"
                type="text"
                inputmode="numeric"
                pattern="[+-]?[0-9]+"
                placeholder="y"
                maxlength="32"
                autocomplete="off"
                aria-describedby="vector-y-error"
              />
              <span id="vector-y-error" class="field-error"></span>
            </label>
          </div>
          <p id="vector-form-error" class="form-error" aria-live="polite"></p>
        </form>

        <section class="control-section component-controls" aria-label="Component arrows">
          <label class="toggle-row" for="standard-components-toggle">
            <span>Components in <span id="standard-toggle-math"></span></span>
            <input id="standard-components-toggle" class="toggle-input" type="checkbox" checked />
            <span class="toggle-pill" aria-hidden="true"></span>
          </label>
          <label class="toggle-row" for="prime-components-toggle">
            <span>Components in <span id="prime-toggle-math"></span></span>
            <input id="prime-components-toggle" class="toggle-input" type="checkbox" checked />
            <span class="toggle-pill" aria-hidden="true"></span>
          </label>
        </section>

        <section class="control-section results-section" aria-labelledby="results-heading">
          <div class="section-heading matrix-heading">
            <h2 id="results-heading">Matrices</h2>
            <span id="basis-status" class="status-chip"></span>
          </div>
          <article class="matrix-card">
            <h3 id="to-standard-heading"></h3>
            <div id="matrix-to-standard" class="math-output matrix-output"></div>
            <div id="mapping-to-standard" class="math-output mapping-output"></div>
          </article>
          <article class="matrix-card">
            <h3 id="to-prime-heading"></h3>
            <div id="matrix-to-prime" class="math-output matrix-output"></div>
            <div id="mapping-to-prime" class="math-output mapping-output"></div>
          </article>
        </section>

        <p
          id="interaction-status"
          class="sr-only"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></p>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
